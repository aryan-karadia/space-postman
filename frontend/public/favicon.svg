<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Neon cyan star icon for Space Postman -->
  <rect width="32" height="32" rx="2" fill="#0A0A0F"/>
  <path d="M16 4 L18.5 12.5 L27 13.5 L20.5 19 L22.5 28 L16 23 L9.5 28 L11.5 19 L5 13.5 L13.5 12.5 Z"
        fill="#00F0FF" opacity="0.9"/>
  <path d="M16 4 L18.5 12.5 L27 13.5 L20.5 19 L22.5 28 L16 23 L9.5 28 L11.5 19 L5 13.5 L13.5 12.5 Z"
        stroke="#00F0FF" stroke-width="0.5" fill="none" opacity="0.5"
        filter="url(#glow)"/>
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
